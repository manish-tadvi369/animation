<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Darshika Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:radial-gradient(ellipse at center,#1a1c2c,#0a0f1c,#05070f);
font-family:'Cormorant Garamond',serif;
color:white;
}

.container{
text-align:center;
z-index:10;
position:relative;
}

.name span{
font-family:'Great Vibes',cursive;
font-size:80px;
background:linear-gradient(to right,#f4a0a0,#e8b4b8,#d4a574,#f4a0a0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
opacity:0;
display:inline-block;
transform:translateY(30px) rotate(-15deg) scale(.8);
animation:letter 1s forwards;
}

.name span:nth-child(1){animation-delay:1s}
.name span:nth-child(2){animation-delay:1.2s}
.name span:nth-child(3){animation-delay:1.4s}
.name span:nth-child(4){animation-delay:1.6s}
.name span:nth-child(5){animation-delay:1.8s}
.name span:nth-child(6){animation-delay:2s}
.name span:nth-child(7){animation-delay:2.2s}
.name span:nth-child(8){animation-delay:2.4s}
.name span:nth-child(9){animation-delay:2.6s}
.name span:nth-child(10){animation-delay:2.8s}
.name span:nth-child(11){animation-delay:3s}
.name span:nth-child(12){animation-delay:3.2s}

@keyframes letter{
to{
opacity:1;
transform:translateY(0) rotate(0) scale(1);
}
}

.tagline{
margin-top:20px;
font-size:26px;
opacity:0;
animation:fade 2s forwards;
animation-delay:4s;
}

@keyframes fade{
to{opacity:1}
}

/* glowing orbs */

.orb{
position:absolute;
border-radius:50%;
filter:blur(80px);
animation:pulse 6s infinite;
}

.orb1{
width:500px;
height:500px;
background:rgba(255,100,150,.3);
}

.orb2{
width:300px;
height:300px;
background:rgba(255,200,100,.2);
animation-delay:1s;
}

@keyframes pulse{
0%,100%{transform:scale(1);opacity:.3}
50%{transform:scale(1.1);opacity:.6}
}

/* petals */

.petal{
position:absolute;
top:-10vh;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* sparkles */

.sparkle{
position:absolute;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0;transform:scale(.5)}
50%{opacity:1;transform:scale(1.2)}
}

</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">

<div class="name" id="name"></div>

<div class="tagline">
A name as beautiful as the stars ✨
</div>

</div>

<script>

const text="Hii Darshika";
const nameContainer=document.getElementById("name");

text.split("").forEach(letter=>{
let span=document.createElement("span");
span.textContent=letter;
nameContainer.appendChild(span);
});

/* petals */

const petals=["🌸","🌺","💮","🪷","✨"];

for(let i=0;i<20;i++){

let petal=document.createElement("div");
petal.className="petal";
petal.innerHTML=petals[Math.floor(Math.random()*petals.length)];

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=10+Math.random()*10+"s";
petal.style.fontSize=12+Math.random()*20+"px";

document.body.appendChild(petal);
}

/* sparkles */

const sparkles=["✦","✧","⭐","✨"];

for(let i=0;i<30;i++){

let s=document.createElement("div");
s.className="sparkle";
s.innerHTML=sparkles[Math.floor(Math.random()*sparkles.length)];

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.fontSize=8+Math.random()*10+"px";

document.body.appendChild(s);
}

</script>

</body>
</html>
